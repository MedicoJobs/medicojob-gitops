namespace: dev
name: location-service
replicaCount: 1
image:
  repository: ghcr.io/medicojobs/medicojob-location-service
  tag: 7eb94f7
  pullPolicy: IfNotPresent
imagePullSecrets: []
service:
  type: ClusterIP
  port: 5005
containerPort: 5005
configMap:
  enabled: true
  name: medicojob-config
secret:
  enabled: true
  name: medicojob-secrets
env:
  PORT: "5005"
httpRoute:
  enabled: true
  gatewayName: medicojob-gateway
  paths:
    - /location
    - /nearby
serviceAccount:
  create: true
job:
  enabled: false
